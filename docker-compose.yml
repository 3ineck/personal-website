services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: eineck-dev:latest
    container_name: eineck-dev
    restart: unless-stopped
    ports:
      - "5000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
